<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
  background: #121212;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.player {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

.cover {
  width: 100%;
  border-radius: 10px;
}

.controls button {
  font-size: 20px;
  margin: 10px;
  padding: 12px;
  border: none;
  border-radius: 50%;
  background: #ff4d4d;
  color: white;
  cursor: pointer;
}

.controls button:hover {
  background: #ff1a1a;
}

input[type="range"] {
  width: 100%;
  margin-top: 10px;
}

.time {
  font-size: 12px;
  margin-top: 5px;
  display: flex;
  justify-content: space-between;
}
</style>

</head>
<body>

<div class="player">
  <img id="cover" src="https://picsum.photos/300" class="cover">

  <h2 id="title">Loading...</h2>
  <p id="artist">Artist</p>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()">▶️</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <input type="range" id="progress" value="0">

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<script>
const songs = [
  {
    title: "Chill Beat",
    artist: "Demo Artist",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    cover: "https://picsum.photos/id/237/300"
  },
  {
    title: "Relax Vibes",
    artist: "Demo Artist",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    cover: "https://picsum.photos/id/238/300"
  },
  {
    title: "Night Mood",
    artist: "Demo Artist",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
    cover: "https://picsum.photos/id/239/300"
  }
];

let index = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

// Load song
function loadSong(song) {
  title.innerText = song.title;
  artist.innerText = song.artist;
  audio.src = song.src;
  cover.src = song.cover;
}

// Play/Pause
function playPause() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

// Next
function nextSong() {
  index = (index + 1) % songs.length;
  loadSong(songs[index]);
  audio.play();
}

// Previous
function prevSong() {
  index = (index - 1 + songs.length) % songs.length;
  loadSong(songs[index]);
  audio.play();
}

// Update progress
audio.addEventListener("timeupdate", () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  progress.value = percent || 0;

  current.innerText = formatTime(audio.currentTime);
  duration.innerText = formatTime(audio.duration);
});

// Seek
progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});

// Volume
volume.addEventListener("input", () => {
  audio.volume = volume.value;
});

// Autoplay next
audio.addEventListener("ended", nextSong);

// Time format
function formatTime(time) {
  if (!time) return "0:00";
  let min = Math.floor(time / 60);
  let sec = Math.floor(time % 60);
  if (sec < 10) sec = "0" + sec;
  return min + ":" + sec;
}

// Load first song
loadSong(songs[index]);
</script>

</body>
</html>
