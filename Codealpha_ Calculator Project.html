<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Calculator</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .calculator {
      background: #1e1e2f; padding: 20px; border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px;
    }
    .top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .toggle {
      cursor: pointer; font-size: 0.9em; color: #ccc;
    }
    .display {
      background: #000; color: #0f0; font-size: 2em;
      padding: 15px; border-radius: 10px; text-align: right;
      margin-bottom: 10px; overflow-x: auto;
    }
    .history {
      font-size: 0.8em; color: #aaa; text-align: right;
      height: 20px; overflow: hidden;
    }
    .buttons {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    button {
      padding: 15px; font-size: 1.1em; border: none;
      border-radius: 10px; cursor: pointer; transition: 0.2s;
    }
    button:hover { transform: scale(1.05); }
    .operator { background: #ff9f43; color: #fff; }
    .equal { background: #10ac84; color: #fff; grid-column: span 2; }
    .clear { background: #ee5253; color: #fff; }
    .number { background: #2d2d44; color: #fff; }
    .light {
      background: #f5f5f5;
    }
    .light .calculator { background: #fff; }
    .light .display { background: #eee; color: #000; }
    .light .number { background: #ddd; color: #000; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="top">
      <div class="history" id="history"></div>
      <div class="toggle" id="themeToggle">🌙</div>
    </div>
    <div id="display" class="display">0</div>
    <div class="buttons">
      <button class="clear">C</button>
      <button class="operator">%</button>
      <button class="operator">/</button>
      <button class="operator">*</button>

      <button class="number">7</button>
      <button class="number">8</button>
      <button class="number">9</button>
      <button class="operator">-</button>

      <button class="number">4</button>
      <button class="number">5</button>
      <button class="number">6</button>
      <button class="operator">+</button>

      <button class="number">1</button>
      <button class="number">2</button>
      <button class="number">3</button>
      <button class="equal">=</button>

      <button class="number">0</button>
      <button class="number">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const history = document.getElementById("history");
    const toggle = document.getElementById("themeToggle");
    let input = "";

    function updateDisplay() {
      display.textContent = input || "0";
    }

    function isOperator(char) {
      return ['+', '-', '*', '/', '%'].includes(char);
    }

    function safeCalculate(expr) {
      try {
        return Function("return " + expr)();
      } catch {
        return "Error";
      }
    }

    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const value = btn.textContent;

        if (value === "C") {
          input = "";
          history.textContent = "";
        } else if (value === "=") {
          history.textContent = input;
          input = safeCalculate(input).toString();
        } else {
          const lastChar = input.slice(-1);

          if (isOperator(value) && isOperator(lastChar)) return;

          input += value;
        }
        updateDisplay();
      });
    });

    // Keyboard Support
    document.addEventListener("keydown", (e) => {
      if ((e.key >= "0" && e.key <= "9") || "+-*/.%".includes(e.key)) {
        const lastChar = input.slice(-1);
        if (!(isOperator(e.key) && isOperator(lastChar))) {
          input += e.key;
        }
      } else if (e.key === "Enter") {
        history.textContent = input;
        input = safeCalculate(input).toString();
      } else if (e.key === "Backspace") {
        input = input.slice(0, -1);
      } else if (e.key.toLowerCase() === "c") {
        input = "";
        history.textContent = "";
      }
      updateDisplay();
    });

    // Theme toggle
    toggle.addEventListener("click", () => {
      document.body.classList.toggle("light");
      toggle.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
    });

    updateDisplay();
  </script>
</body>
</html>
