<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0f172a;color:#fff;padding:20px}

h1{text-align:center;margin-bottom:20px}

/* Filter buttons */
.filters{text-align:center;margin-bottom:20px}
.filters button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#38bdf8;
  cursor:pointer;
}

/* Gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* Lightbox */
.lightbox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.lightbox img{
  max-width:80%;
  max-height:80%;
  border-radius:10px;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:2em;
  color:white;
  background:none;
  border:none;
  cursor:pointer;
}

.prev{left:20px}
.next{right:20px}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:2em;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Image Gallery</h1>

<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery" id="gallery">
  <img src="https://picsum.photos/300/200?1" data-category="nature">
  <img src="https://picsum.photos/300/200?2" data-category="city">
  <img src="https://picsum.photos/300/200?3" data-category="nature">
  <img src="https://picsum.photos/300/200?4" data-category="city">
  <img src="https://picsum.photos/300/200?5" data-category="nature">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <button class="nav-btn prev" onclick="prevImage()">❮</button>
  <img id="lightboxImg">
  <button class="nav-btn next" onclick="nextImage()">❯</button>
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
let currentIndex = 0;

images.forEach((img, index) => {
  img.addEventListener('click', () => {
    currentIndex = index;
    showImage();
    lightbox.style.display = 'flex';
  });
});

function showImage(){
  lightboxImg.src = images[currentIndex].src;
}

function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  showImage();
}

function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  showImage();
}

function closeLightbox(){
  lightbox.style.display = 'none';
}

// Filter
function filterImages(category){
  images.forEach(img => {
    if(category === 'all' || img.dataset.category === category){
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
